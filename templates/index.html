<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostCitation</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --green: #34d399;
            --red: #f87171;
            --yellow: #fbbf24;
            --orange: #fb923c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        .lang-switch {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
        }

        .lang-switch button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: color 0.2s, border-color 0.2s;
        }

        .lang-switch button:hover,
        .lang-switch button.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: var(--surface);
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(129, 140, 248, 0.05);
        }

        .upload-zone input[type="file"] { display: none; }

        .upload-zone .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .upload-zone p { color: var(--text-muted); }
        .upload-zone .formats { font-size: 0.85rem; margin-top: 0.5rem; }

        .api-key-section {
            margin-top: 1rem;
            text-align: center;
        }

        .api-key-section input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.8rem;
            color: var(--text);
            font-size: 0.85rem;
            width: 320px;
            max-width: 100%;
        }

        .api-key-section label {
            display: block;
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 0.4rem;
        }

        #status {
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin: 1rem 0;
            display: none;
        }

        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
            border-radius: 3px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .summary-card {
            background: var(--surface);
            border-radius: 10px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .summary-card .num {
            font-size: 2rem;
            font-weight: 700;
        }

        .summary-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        .num.verified { color: var(--green); }
        .num.misattributed { color: var(--yellow); }
        .num.fabricated { color: var(--red); }

        .results { margin-top: 1.5rem; }

        .ref-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
        }

        .ref-card .verdict-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-verified { background: rgba(52, 211, 153, 0.15); color: var(--green); }
        .badge-misattributed { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
        .badge-fabricated { background: rgba(248, 113, 113, 0.15); color: var(--red); }

        .ref-card .ref-raw {
            margin-top: 0.6rem;
            font-size: 0.92rem;
            line-height: 1.5;
            color: var(--text);
        }

        .ref-card .ref-details {
            margin-top: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .ref-card .ref-number {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .ref-card.pending {
            opacity: 0.6;
        }

        .ref-card.checking {
            border-color: var(--accent);
            opacity: 1;
        }

        .ref-card.done {
            opacity: 1;
        }

        .step-log {
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .step-line {
            padding: 0.15rem 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .step-icon {
            display: inline-block;
            width: 1rem;
            text-align: center;
        }

        .step-trying .step-icon { color: var(--accent); }
        .step-found .step-icon { color: var(--green); }
        .step-not_found .step-icon { color: var(--text-muted); }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mismatch-list {
            margin-top: 0.6rem;
            padding: 0.6rem 0.8rem;
            background: rgba(251, 191, 36, 0.06);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 6px;
            font-size: 0.82rem;
        }

        .mismatch-item {
            margin: 0.3rem 0;
            color: var(--yellow);
        }

        .mismatch-item .field-label {
            font-weight: 600;
        }

        .mismatch-item .actual-value {
            color: var(--text-muted);
        }

        .hidden { display: none !important; }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button id="btnEn" class="active" onclick="setLang('en')">EN</button>
            <button id="btnZh" onclick="setLang('zh')">ZH</button>
        </div>

        <header>
            <h1>GhostCitation</h1>
            <p data-i18n="subtitle"></p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <span class="icon">&#128196;</span>
            <p data-i18n="dropzone"></p>
            <p class="formats" data-i18n="formats"></p>
            <input type="file" id="fileInput" accept=".pdf,.docx">
        </div>

        <div class="api-key-section">
            <label for="scraperApiKeyInput" data-i18n="scraperapi_label"></label>
            <input type="password" id="scraperApiKeyInput" data-i18n-placeholder="scraperapi_placeholder">
            <label for="apiKeyInput" style="margin-top: 0.6rem" data-i18n="serpapi_label"></label>
            <input type="password" id="apiKeyInput" data-i18n-placeholder="serpapi_placeholder">
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>

        <p id="status"></p>

        <div id="summarySection" class="hidden">
            <div class="summary">
                <div class="summary-card">
                    <div class="num" id="totalCount">0</div>
                    <div class="label" data-i18n="total"></div>
                </div>
                <div class="summary-card">
                    <div class="num verified" id="verifiedCount">0</div>
                    <div class="label" data-i18n="verified"></div>
                </div>
                <div class="summary-card">
                    <div class="num misattributed" id="misattributedCount">0</div>
                    <div class="label" data-i18n="misattributed"></div>
                </div>
                <div class="summary-card">
                    <div class="num fabricated" id="fabricatedCount">0</div>
                    <div class="label" data-i18n="fabricated"></div>
                </div>
            </div>
        </div>

        <div class="results" id="results"></div>

        <footer>
            <p data-i18n="footer_text"></p>
        </footer>
    </div>

    <script>
        // ---- i18n ----
        const I18N = {
            en: {
                subtitle: "Upload a paper to detect AI-fabricated references",
                dropzone: "Drop file here, or click to select",
                formats: "Supported formats: PDF, DOCX (max 20 MB)",
                scraperapi_label: "ScraperAPI Key (for Google Scholar scraping, optional)",
                scraperapi_placeholder: "Enter ScraperAPI Key...",
                serpapi_label: "SerpAPI Key (for Google Scholar API, optional)",
                serpapi_placeholder: "Enter SerpAPI Key...",
                total: "Total",
                verified: "Verified",
                misattributed: "Misattributed",
                fabricated: "Suspected Fake",
                footer_text: 'GhostCitation — Open-source reference verification tool | <a href="https://github.com/torrentpien/GhostCitation" target="_blank">GitHub</a>',
                // dynamic strings
                only_pdf_docx: "Only PDF and DOCX files are supported",
                parsing: (name) => `Parsing references in "${name}"...`,
                upload_fail: "Upload failed",
                upload_error: "Error during upload",
                found_refs: (n) => `Found ${n} references, verifying...`,
                check_fail: "Verification failed",
                check_error: "Error during verification",
                check_done: "Verification complete!",
                verdict_verified: "Verified",
                verdict_misattributed: "Misattributed",
                verdict_fabricated: "Suspected Fake",
                type_academic: "Academic",
                type_non_academic: "Non-academic",
                label_type: "Type",
                label_matched_title: "Matched title",
                label_actual_authors: "Actual authors",
                label_actual_year: "Actual year",
                label_source_link: "Source link",
                label_correct: "Correct",
                label_sources: "Sources",
                mismatch_title: (sim) => `Title mismatch (similarity ${sim})`,
                mismatch_authors: (overlap) => `Author mismatch (overlap ${overlap})`,
                mismatch_year: (claimed, actual) => `Year mismatch (listed ${claimed}, actual ${actual})`,
                no_file: "No file selected",
                no_refs: "No references section found",
                no_data: "Missing reference data",
                checking_ref: (i, total) => `Checking reference ${i}/${total}...`,
                source_crossref_doi: "CrossRef (DOI)",
                source_crossref: "CrossRef",
                source_google_scholar: "Google Scholar",
                source_google_scholar_book: "Google Scholar (book title)",
                source_google: "Google Web Search",
                step_trying: "searching...",
                step_found: "found",
                step_not_found: "not found",
            },
            zh: {
                subtitle: "\u4e0a\u50b3\u8ad6\u6587\uff0c\u81ea\u52d5\u6aa2\u6e2c\u53c3\u8003\u6587\u737b\u662f\u5426\u70ba AI \u634f\u9020",
                dropzone: "\u62d6\u66f3\u6a94\u6848\u81f3\u6b64\u8655\uff0c\u6216\u9ede\u64ca\u9078\u64c7\u6a94\u6848",
                formats: "\u652f\u63f4\u683c\u5f0f\uff1aPDF\u3001DOCX\uff08\u4e0a\u9650 20 MB\uff09",
                scraperapi_label: "ScraperAPI Key\uff08\u7528\u65bc Google Scholar \u722c\u87f2\u67e5\u8a62\uff0c\u9078\u586b\uff09",
                scraperapi_placeholder: "\u8f38\u5165 ScraperAPI Key...",
                serpapi_label: "SerpAPI Key\uff08\u7528\u65bc Google Scholar API \u67e5\u8a62\uff0c\u9078\u586b\uff09",
                serpapi_placeholder: "\u8f38\u5165 SerpAPI Key...",
                total: "\u7e3d\u5171",
                verified: "\u5df2\u9a57\u8b49",
                misattributed: "\u5f15\u7528\u6709\u8aa4",
                fabricated: "\u7591\u4f3c\u634f\u9020",
                footer_text: 'GhostCitation \u2014 \u958b\u6e90\u53c3\u8003\u6587\u737b\u9a57\u8b49\u5de5\u5177 | <a href="https://github.com/torrentpien/GhostCitation" target="_blank">GitHub</a>',
                only_pdf_docx: "\u50c5\u652f\u63f4 PDF \u548c DOCX \u6a94\u6848",
                parsing: (name) => `\u6b63\u5728\u89e3\u6790\u300c${name}\u300d\u4e2d\u7684\u53c3\u8003\u6587\u737b...`,
                upload_fail: "\u4e0a\u50b3\u5931\u6557",
                upload_error: "\u4e0a\u50b3\u904e\u7a0b\u767c\u751f\u932f\u8aa4",
                found_refs: (n) => `\u627e\u5230 ${n} \u7b46\u53c3\u8003\u6587\u737b\uff0c\u958b\u59cb\u9a57\u8b49...`,
                check_fail: "\u9a57\u8b49\u5931\u6557",
                check_error: "\u9a57\u8b49\u904e\u7a0b\u767c\u751f\u932f\u8aa4",
                check_done: "\u9a57\u8b49\u5b8c\u6210\uff01",
                verdict_verified: "\u5df2\u9a57\u8b49",
                verdict_misattributed: "\u5f15\u7528\u6709\u8aa4",
                verdict_fabricated: "\u7591\u4f3c\u634f\u9020",
                type_academic: "\u5b78\u8853\u6587\u737b",
                type_non_academic: "\u975e\u5b78\u8853\u6587\u737b",
                label_type: "\u985e\u578b",
                label_matched_title: "\u6bd4\u5c0d\u6a19\u984c",
                label_actual_authors: "\u5be6\u969b\u4f5c\u8005",
                label_actual_year: "\u5be6\u969b\u5e74\u4efd",
                label_source_link: "\u4f86\u6e90\u9023\u7d50",
                label_correct: "\u6b63\u78ba",
                label_sources: "\u67e5\u8a62\u4f86\u6e90",
                mismatch_title: (sim) => `\u6a19\u984c\u4e0d\u5b8c\u5168\u5339\u914d\uff08\u76f8\u4f3c\u5ea6 ${sim}\uff09`,
                mismatch_authors: (overlap) => `\u4f5c\u8005\u4e0d\u7b26\uff08\u5339\u914d\u7387 ${overlap}\uff09`,
                mismatch_year: (claimed, actual) => `\u5e74\u4efd\u4e0d\u7b26\uff08\u6a19\u793a ${claimed}\uff0c\u5be6\u969b ${actual}\uff09`,
                no_file: "\u672a\u9078\u64c7\u6a94\u6848",
                no_refs: "\u627e\u4e0d\u5230\u53c3\u8003\u6587\u737b\u5340\u6bb5",
                no_data: "\u7f3a\u5c11\u53c3\u8003\u6587\u737b\u8cc7\u6599",
                checking_ref: (i, total) => `正在驗證第 ${i}/${total} 筆文獻...`,
                source_crossref_doi: "CrossRef (DOI)",
                source_crossref: "CrossRef",
                source_google_scholar: "Google Scholar",
                source_google_scholar_book: "Google Scholar（書名查詢）",
                source_google: "Google 網頁搜尋",
                step_trying: "查詢中...",
                step_found: "已找到",
                step_not_found: "未找到",
            },
        };

        let currentLang = 'en';

        function t(key, ...args) {
            const val = I18N[currentLang][key];
            if (typeof val === 'function') return val(...args);
            return val || key;
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('ghostcitation_lang', lang);
            document.getElementById('btnEn').classList.toggle('active', lang === 'en');
            document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
            document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en';
            document.title = 'GhostCitation';
            // Update all data-i18n elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const val = I18N[currentLang][key];
                if (val) el.innerHTML = val;
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                const val = I18N[currentLang][key];
                if (val) el.placeholder = val;
            });
        }

        // Init language from localStorage or default to English
        (function() {
            const saved = localStorage.getItem('ghostcitation_lang');
            setLang(saved || 'en');
        })();

        // ---- App logic ----
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const summarySection = document.getElementById('summarySection');
        const resultsDiv = document.getElementById('results');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const scraperApiKeyInput = document.getElementById('scraperApiKeyInput');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        async function handleFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['pdf', 'docx'].includes(ext)) {
                status.textContent = t('only_pdf_docx');
                return;
            }

            // Reset UI
            resultsDiv.innerHTML = '';
            summarySection.classList.add('hidden');
            progressBar.style.display = 'block';
            progressFill.style.width = '10%';
            status.textContent = t('parsing', file.name);

            // Upload and extract
            const formData = new FormData();
            formData.append('file', file);

            let refs;
            try {
                const resp = await fetch('/upload', { method: 'POST', body: formData });
                const data = await resp.json();
                if (!resp.ok) {
                    status.textContent = data.error || t('upload_fail');
                    progressBar.style.display = 'none';
                    return;
                }
                refs = data.references;
                status.textContent = t('found_refs', data.count);
                progressFill.style.width = '30%';
            } catch (e) {
                status.textContent = t('upload_error');
                progressBar.style.display = 'none';
                return;
            }

            // Create placeholder cards for all references
            resultsDiv.innerHTML = '';
            summarySection.classList.remove('hidden');
            document.getElementById('totalCount').textContent = refs.length;
            document.getElementById('verifiedCount').textContent = 0;
            document.getElementById('misattributedCount').textContent = 0;
            document.getElementById('fabricatedCount').textContent = 0;

            refs.forEach((ref, i) => {
                const card = document.createElement('div');
                card.className = 'ref-card pending';
                card.id = `ref-card-${i}`;
                card.innerHTML = `
                    <div class="ref-number">#${i + 1}</div>
                    <span class="verdict-badge" style="background:var(--border);color:var(--text-muted)">...</span>
                    <div class="ref-raw">${escapeHtml(ref.raw || '')}</div>
                    <div class="step-log" id="step-log-${i}"></div>
                `;
                resultsDiv.appendChild(card);
            });

            // Check references via SSE stream
            try {
                const apiKey = apiKeyInput.value.trim();
                const scraperApiKey = scraperApiKeyInput.value.trim();
                const resp = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        references: refs,
                        serpapi_key: apiKey,
                        scraperapi_key: scraperApiKey,
                    }),
                });

                if (!resp.ok) {
                    const errData = await resp.json().catch(() => ({}));
                    status.textContent = errData.error || t('check_fail');
                    progressBar.style.display = 'none';
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let verdictCounts = { verified: 0, misattributed: 0, fabricated: 0 };

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // Parse SSE lines
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete line in buffer

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        let evt;
                        try { evt = JSON.parse(line.slice(6)); } catch { continue; }

                        if (evt.type === 'step') {
                            handleStepEvent(evt);
                        } else if (evt.type === 'result') {
                            handleResultEvent(evt, refs, verdictCounts);
                            const pct = 30 + (evt.current / evt.total) * 70;
                            progressFill.style.width = pct + '%';
                            status.textContent = t('checking_ref', evt.current, evt.total);
                        } else if (evt.type === 'done') {
                            progressFill.style.width = '100%';
                            status.textContent = t('check_done');
                        }
                    }
                }
            } catch (e) {
                status.textContent = t('check_error');
            }
        }

        function handleStepEvent(evt) {
            const log = document.getElementById(`step-log-${evt.ref_index}`);
            const card = document.getElementById(`ref-card-${evt.ref_index}`);
            if (!log || !card) return;

            card.className = 'ref-card checking';

            const sourceName = t('source_' + evt.source) || evt.source;

            if (evt.status === 'trying') {
                // Add a new step line with spinner
                const line = document.createElement('div');
                line.className = 'step-line step-trying';
                line.id = `step-${evt.ref_index}-${evt.source}`;
                line.innerHTML = `<span class="step-icon"><span class="spinner"></span></span> ${escapeHtml(sourceName)} ${t('step_trying')}`;
                log.appendChild(line);
                // Scroll card into view
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                // Update the existing step line
                const line = document.getElementById(`step-${evt.ref_index}-${evt.source}`);
                if (line) {
                    if (evt.status === 'found') {
                        line.className = 'step-line step-found';
                        line.innerHTML = `<span class="step-icon">&#10004;</span> ${escapeHtml(sourceName)} — ${t('step_found')}`;
                    } else {
                        line.className = 'step-line step-not_found';
                        line.innerHTML = `<span class="step-icon">&#10007;</span> ${escapeHtml(sourceName)} — ${t('step_not_found')}`;
                    }
                }
            }
        }

        function handleResultEvent(evt, refs, verdictCounts) {
            const card = document.getElementById(`ref-card-${evt.ref_index}`);
            if (!card) return;

            const r = evt.result;
            card.className = 'ref-card done';

            // Update verdict counts
            if (r.verdict in verdictCounts) {
                verdictCounts[r.verdict]++;
            }
            document.getElementById('verifiedCount').textContent = verdictCounts.verified;
            document.getElementById('misattributedCount').textContent = verdictCounts.misattributed;
            document.getElementById('fabricatedCount').textContent = verdictCounts.fabricated;

            const verdictLabel = t('verdict_' + r.verdict);
            const badgeClass = {
                'verified': 'badge-verified',
                'misattributed': 'badge-misattributed',
                'fabricated': 'badge-fabricated',
            }[r.verdict] || '';

            // Update the badge
            const badge = card.querySelector('.verdict-badge');
            if (badge) {
                badge.className = `verdict-badge ${badgeClass}`;
                badge.textContent = verdictLabel;
                badge.style.background = '';
                badge.style.color = '';
            }

            // Build details HTML
            let detailsHtml = '';
            const typeLabel = r.ref_type === 'non_academic' ? t('type_non_academic') : t('type_academic');
            detailsHtml += `<div class="ref-details">${t('label_type')}: ${typeLabel}</div>`;

            if (r.verified_title) {
                detailsHtml += `<div class="ref-details">&#10004; ${t('label_matched_title')}: ${escapeHtml(r.verified_title)}</div>`;
            }
            if (r.verified_authors && r.verified_authors.length > 0) {
                const authStr = r.verified_authors.slice(0, 4).join('; ');
                const suffix = r.verified_authors.length > 4 ? ' et al.' : '';
                detailsHtml += `<div class="ref-details">&#10004; ${t('label_actual_authors')}: ${escapeHtml(authStr + suffix)}</div>`;
            }
            if (r.verified_year) {
                detailsHtml += `<div class="ref-details">&#10004; ${t('label_actual_year')}: ${escapeHtml(r.verified_year)}</div>`;
            }
            if (r.verified_url) {
                detailsHtml += `<div class="ref-details">&#10004; ${t('label_source_link')}: <a href="${escapeHtml(r.verified_url)}" target="_blank" style="color:var(--accent)">${escapeHtml(r.verified_url)}</a></div>`;
            }

            if (r.mismatches && r.mismatches.length > 0) {
                let mismatchHtml = '<div class="mismatch-list">';
                r.mismatches.forEach(m => {
                    let desc = m.description;
                    if (m.field === 'title') {
                        desc = t('mismatch_title', (m.similarity * 100).toFixed(0) + '%');
                    } else if (m.field === 'authors') {
                        desc = t('mismatch_authors', (m.overlap * 100).toFixed(0) + '%');
                    } else if (m.field === 'year') {
                        desc = t('mismatch_year', m.claimed, m.actual);
                    }
                    mismatchHtml += `<div class="mismatch-item">`;
                    mismatchHtml += `<span class="field-label">&#9888; ${escapeHtml(desc)}</span>`;
                    if (m.actual) {
                        mismatchHtml += `<br><span class="actual-value">${t('label_correct')}: ${escapeHtml(m.actual)}</span>`;
                    }
                    mismatchHtml += `</div>`;
                });
                mismatchHtml += '</div>';
                detailsHtml += mismatchHtml;
            }

            if (r.doi) {
                detailsHtml += `<div class="ref-details">DOI: ${escapeHtml(r.doi)}</div>`;
            }
            const sources = r.checks ? r.checks.map(c => c.source).join(', ') : '';
            if (sources) {
                detailsHtml += `<div class="ref-details">${t('label_sources')}: ${escapeHtml(sources)}</div>`;
            }

            // Insert details after the step-log
            const stepLog = card.querySelector('.step-log');
            if (stepLog) {
                stepLog.insertAdjacentHTML('afterend', detailsHtml);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
